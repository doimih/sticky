server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /api/health {
    if ($http_origin != "https://projects.doimih.net") {
      return 403;
    }

    default_type application/json;
    add_header Access-Control-Allow-Origin "https://projects.doimih.net" always;
    add_header Vary "Origin" always;

    return 200 '{"status":"ok","service":"sticky","timestamp":"$time_iso8601"}';
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
